services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      FRONTEND_ORIGINS: ${DOCKER_FRONTEND_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://127.0.0.1:8000}
    depends_on:
      - backend
    ports:
      - "8080:80"
